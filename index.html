<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseiMC Elite Store | BloodStrike</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1c40f; --blood: #e74c3c; --dark: #0a0a0b; --card: #161618; }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        /* Banner con Imagen Real */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://img.freepik.com/vector-premium/fondo-linea-vibrante-abstracta-color-negro-amarillo_643530-588.jpg');
            background-size: cover; background-position: center;
            padding: 40px 15px; text-align: center; border-bottom: 2px solid var(--gold);
        }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); margin: 0; font-size: 1.5rem; text-shadow: 0 0 15px rgba(241,196,15,0.6); }

        .loyalty-section {
            background: #1a1a1d; margin: 15px; padding: 15px; border-radius: 12px;
            border: 1px solid #333; text-align: center;
        }
        .bar-container { background: #333; height: 10px; border-radius: 5px; margin: 12px 0; overflow: hidden; }
        .bar-fill { background: var(--gold); width: 25%; height: 100%; box-shadow: 0 0 10px var(--gold); }

        /* Cuadrícula de Productos */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .p-card {
            background: var(--card); border-radius: 12px; border: 1px solid #2a2a2c;
            overflow: hidden; transition: 0.3s;
        }
        .p-img { width: 100%; height: 120px; object-fit: contain; background: #222; padding: 10px; box-sizing: border-box; }
        .p-info { padding: 10px; text-align: center; }
        .p-name { font-size: 0.75rem; color: #fff; font-weight: 600; text-transform: uppercase; }
        .p-price { color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-top: 4px; }

        .order-box { background: #1a1a1d; margin: 0 15px 30px; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .input-field {
            width: 100%; padding: 14px; margin-bottom: 15px; background: #252529;
            border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; font-size: 1rem;
        }
        .input-field:focus { border-color: var(--gold); outline: none; }
        
        .btn-whatsapp {
            background: #25d366; color: white; border: none; padding: 18px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 1rem;
        }
        .payment-tag { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; border-left: 4px solid #27ae60; }
    </style>
</head>
<body>

<div class="hero">
    <h1>SENSEI MC ELITE</h1>
    <p style="color: #bbb; font-size: 0.9rem; margin-top: 5px;">RECARGAS • VENEZUELA</p>
</div>

<div class="loyalty-section">
    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
        <span style="color: var(--gold); font-weight: bold;">SISTEMA DE PUNTOS</span>
        <span style="color: #888;">Nivel: Recluta</span>
    </div>
    <div class="bar-container"><div class="bar-fill"></div></div>
    <p style="font-size: 0.7rem; color: #888; margin: 0;">Inicia sesión pronto para canjear 100 Oro Gratis.</p>
</div>

<div class="products-grid">
    <div class="p-card">
        <img src="https://cdna.artstation.com/p/assets/images/images/062/481/814/large/m-a-creations-bs-currency.jpg?1683216837" class="p-img" alt="Gold">
        <div class="p-info">
            <div class="p-name">ORO BLOODSTRIKE</div>
            <div class="p-price">Desde $1.20</div>
        </div>
    </div>
    <div class="p-card">
        <img src="https://i.ytimg.com/vi/MUnD_pZz6vA/mqdefault.jpg" class="p-img" alt="Pass">
        <div class="p-info">
            <div class="p-name">PASE DE BATALLA</div>
            <div class="p-price">Desde $5.80</div>
        </div>
    </div>
</div>

<div class="order-box">
    <div class="payment-tag">
        <strong style="color: #27ae60;">💸 PAGO MÓVIL:</strong><br>
        0102 • CI: 31.644.563 • 04262990035
    </div>

    <input type="number" id="id_order" class="input-field" placeholder="ID del Jugador">
    
    <select id="pack_order" class="input-field">
        <option value="105 Oro - $1.20">105 Oro - $1.20</option>
        <option value="310 Oro - $3.40">310 Oro - $3.40</option>
        <option value="530 Oro - $5.60">530 Oro - $5.60</option>
        <option value="1080 Oro - $11.20">1080 Oro - $11.20</option>
        <option value="Pase Elite - $5.80">Pase Elite - $5.80</option>
        <option value="Pase Premium - $12.00">Pase Premium - $12.00</option>
    </select>

    <input type="number" id="ref_order" class="input-field" placeholder="Referencia de Pago">

    <button class="btn-whatsapp" onclick="enviar()">CONFIRMAR PEDIDO</button>
</div>

<script>
    function enviar() {
        const id = document.getElementById('id_order').value;
        const pack = document.getElementById('pack_order').value;
        const ref = document.getElementById('ref_order').value;
        if(!id || !ref) { alert("Complete los datos"); return; }
        const msg = `*PEDIDO SENSEI*%0A*ID:* ${id}%0A*Pack:* ${pack}%0A*Ref:* ${ref}`;
        window.open(`https://wa.me/584223730104?text=${msg}`);
    }
</script>

</body>
</html>
