<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodStrike Store | SenseiMC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f39c12;
            --bg: #0b0d0f;
            --text: #ffffff;
            --accent: #27ae60;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 450px;
            margin: 20px auto;
            background: #15181c;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #2a2e35;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.4rem; margin: 0; }

        .payment-card {
            background: #1e272e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; font-weight: bold; color: #bdc3c7; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #34495e;
            background: #25282c;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        /* Elimina flechas de input number en Chrome/Safari/Edge */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-confirm {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        .footer-tag { text-align: center; margin-top: 25px; font-size: 0.75rem; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>BLOODSTRIKE RECARGAS</h1>
        <p style="font-size: 0.85rem; color: #888;">Seguro • Rápido • Confiable</p>
    </header>

    <div class="payment-card">
        <strong style="color: var(--accent); font-size: 0.8rem;">DATOS PAGO MÓVIL:</strong>
        <p style="margin: 5px 0; font-size: 0.9rem;">
            0102 • 31.644.563 • 04262990035
        </p>
    </div>

    <div class="form-group">
        <label>ID DEL JUGADOR:</label>
        <input type="number" id="player_id" placeholder="ID numérico aquí" required>
    </div>

    <div class="form-group">
        <label>TU NOMBRE EN EL JUEGO:</label>
        <input type="text" id="player_nick" placeholder="Tu Nickname (opcional)" required>
    </div>

    <div class="form-group">
        <label>SELECCIONA TU PACK:</label>
        <select id="product_selection">
            <option value="105 Oro - $1.20">105 Oro - $1.20</option>
            <option value="310 Oro - $3.40">310 Oro - $3.40</option>
            <option value="530 Oro - $5.60">530 Oro - $5.60</option>
            <option value="1080 Oro - $11.20">1080 Oro - $11.20</option>
            <option value="2200 Oro - $22.50">2200 Oro - $22.50</option>
            <option value="5800 Oro - $56.00">5800 Oro - $56.00</option>
            <option value="Pase Elite - $5.80">Pase Elite - $5.80</option>
            <option value="Pase Premium - $12.00">Pase Premium - $12.00</option>
        </select>
    </div>

    <div class="form-group">
        <label>REFERENCIA DEL PAGO (SÓLO NÚMEROS):</label>
        <input type="number" id="pay_ref" placeholder="Ej: 847291" required>
    </div>

    <button class="btn-confirm" onclick="enviarPedido()">
        Pedir por WhatsApp
    </button>

    <div class="footer-tag">
        © 2026 SenseiMC Store
    </div>
</div>

<script>
    function enviarPedido() {
        const telefono = "584223730104";
        const id = document.getElementById('player_id').value;
        const nick = document.getElementById('player_nick').value;
        const producto = document.getElementById('product_selection').value;
        const ref = document.getElementById('pay_ref').value;

        if (!id || !ref) {
            alert("Señor, el ID y la Referencia son obligatorios.");
            return;
        }

        const mensaje = `*PEDIDO BLOODSTRIKE*%0A` +
                        `--------------------------%0A` +
                        `*ID:* ${id}%0A` +
                        `*Nick:* ${nick || 'No indicado'}%0A` +
                        `*Pack:* ${producto}%0A` +
                        `*Ref:* ${ref}%0A` +
                        `--------------------------`;

        window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank');
    }
</script>

</body>
</html>
