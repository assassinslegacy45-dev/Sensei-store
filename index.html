<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenseiMC Elite | BloodStrike Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f1c40f;
            --blood: #e74c3c;
            --dark: #050505;
            --card: #121212;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://via.placeholder.com/800x400?text=BloodStrike+Banner');
            background-size: cover;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--gold); text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }

        .loyalty-card {
            background: linear-gradient(45deg, #1a1a1a, #2c3e50);
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            text-align: center;
        }

        .points-bar {
            background: #333;
            height: 10px;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .points-progress {
            background: var(--gold);
            width: 35%; /* Esto cambiará con el sistema de cuentas */
            height: 100%;
            box-shadow: 0 0 10px var(--gold);
        }

        .grid-productos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .producto-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .producto-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .producto-img {
            width: 100%;
            height: 100px;
            background: #222;
            object-fit: cover;
        }

        .producto-info { padding: 10px; text-align: center; }
        .precio { color: var(--gold); font-weight: bold; font-size: 1.1rem; }

        .btn-buy {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .footer { padding: 20px; text-align: center; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

<div class="hero">
    <h1>SENSEI MC STORE</h1>
    <p>RECARGAS OFICIALES DE BLOODSTRIKE</p>
</div>

<div class="loyalty-card">
    <h3 style="margin:0; font-size: 0.9rem;">PROGRAMA DE PUNTOS ELITE</h3>
    <div class="points-bar"><div class="points-progress"></div></div>
    <p style="font-size: 0.8rem;">¡Llevas 7/20 recargas! Faltan 13 para tu <strong>ORO GRATIS</strong></p>
</div>

<div class="grid-productos">
    <div class="producto-card">
        <img src="https://via.placeholder.com/200x200?text=105+Gold" class="producto-img">
        <div class="producto-info">
            <div style="font-size: 0.8rem;">105 ORO</div>
            <div class="precio">$1.20</div>
        </div>
        <button class="btn-buy" onclick="pedir('105 Oro')">Comprar</button>
    </div>

    <div class="producto-card">
        <img src="https://via.placeholder.com/200x200?text=Pase+Elite" class="producto-img">
        <div class="producto-info">
            <div style="font-size: 0.8rem;">PASE ELITE</div>
            <div class="precio">$5.80</div>
        </div>
        <button class="btn-buy" onclick="pedir('Pase Elite')">Comprar</button>
    </div>
</div>

<div style="padding: 20px;">
    <input type="number" id="id_player" placeholder="ID de Jugador" style="width:100%; padding:12px; background:#1a1a1a; color:white; border:1px solid #333; border-radius:8px;">
</div>

<div class="footer">
    © 2026 SenseiMC | Guarenas, Venezuela
</div>

<script>
    function pedir(prod) {
        const id = document.getElementById('id_player').value;
        if(!id) { alert("Señor, ingrese su ID primero"); return; }
        const msg = `*PEDIDO SENSEI STORE*%0A*ID:* ${id}%0A*Producto:* ${prod}`;
        window.open(`https://wa.me/584223730104?text=${msg}`);
    }
</script>

</body>
</html>
